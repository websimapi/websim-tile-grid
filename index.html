<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tile Grid</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="css/animations.css">
    <link rel="stylesheet" href="css/objects.css">
    <link rel="stylesheet" href="css/player.css">
    <link rel="stylesheet" href="css/ui.css">
    <link rel="stylesheet" href="css/mobile.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    
    <script type="importmap">
    {
        "imports": {
            "simplex-noise": "https://cdn.skypack.dev/simplex-noise@4.0.1",
            "noisejs": "https://cdn.skypack.dev/noisejs@2.1.0",
            "./constants.js": "./js/constants.js",
            "./state.js": "./js/state.js",
            "./seed.js": "./js/seed.js",
            "./asset-manager.js": "./js/asset-manager.js",
            "./audio-manager.js": "./js/audio-manager.js",
            "./noise.js": "./js/noise.js",
            "./world-generation.js": "./js/world-generation.js",
            "./world.js": "./js/world.js",
            "./player.js": "./js/player.js",
            "./renderer.js": "./js/renderer.js",
            "./interaction.js": "./js/interaction.js",
            "./minimap.js": "./js/minimap.js",
            "./debug.js": "./js/debug.js",
            "./main.js": "./js/main.js",
            "./game-loop.js": "./js/game-loop.js",
            "./entities.js": "./js/entities.js",
            "./ui.js": "./js/ui.js",
            "./input-handler.js": "./js/input-handler.js",
            "./utils.js": "./js/utils.js",
            "./terrain.js": "./js/terrain.js",
            "./tile-lookups.js": "./js/tile-lookups.js",
            "./object-placement.js": "./js/object-placement.js",
            "./inventory-manager.js": "./js/inventory-manager.js",
            "./ui/hotbar.js": "./js/ui/hotbar.js",
            "./ui/inventory.js": "./js/ui/inventory.js",
            "./ui/crafting.js": "./js/ui/crafting.js",
            "./ui/tooltip.js": "./js/ui/tooltip.js",
            "./ui/drag-drop.js": "./js/ui/drag-drop.js",
            "./save-system.js": "./js/save-system.js",
            "./item-spawner.js": "./js/item-spawner.js",
            "./environment.js": "./js/environment.js",
            "./building.js": "./js/building.js",
            "./biome-data.js": "./js/biome-data.js",
            "./object-factory.js": "./js/object-factory.js",
            "./resource-gathering.js": "./js/resource-gathering.js"
        }
    }
    </script>
</head>
<body oncontextmenu="return false">
    <div id="fps-counter"></div>
    <button id="reset-progress-btn" aria-label="Reset Progress">Reset Progress</button>
    <canvas id="minimap"></canvas>
    <div id="game-world">
        <div id="grid-container"></div>
        <div id="tile-highlighter"></div>
        <div id="player">
            <div id="held-item"></div>
        </div>
        <div id="virtual-object-container"></div>
        <!-- Interaction prompt will be added here by script.js -->
    </div>

    <div id="hunger-bar"></div>
    <div id="touch-controls">
        <div id="touch-joystick-base" style="display: none;">
            <div id="touch-joystick-knob"></div>
        </div>
    </div>

    <div id="hotbar-container"></div>
    <div id="inventory-overlay">
        <div id="inventory-grid"></div>
        <div id="equipment-slots"></div>
        <div id="inventory-left-panel">
            <!-- Slots will be generated by js/ui/crafting.js -->
        </div>
        <div id="crafting-scroll-indicator">
            <div id="crafting-scroll-up" class="scroll-arrow">▲</div>
            <div id="crafting-scroll-down" class="scroll-arrow">▼</div>
        </div>
    </div>
    <div id="tooltip" role="tooltip" aria-hidden="true"></div>
    <div id="item-toast" aria-live="polite" aria-atomic="true"></div>
    
    <button id="spawn-tumbleweed-btn" style="display: none;">Spawn Tumbleweed</button>

    <div id="loading-screen" class="visible">
        <div class="loading-text">Loading...</div>
    </div>
    
    <script type="module" src="js/main.js"></script>

</body>
</html>
